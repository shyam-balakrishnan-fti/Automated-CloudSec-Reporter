# scubagear_config.toml — ScubaGear pipeline configuration
# Independent of the Prowler pipeline config. Zero shared state.
# API keys are NEVER stored here — use environment variables or IAM roles.

# ── Engagement (change every run) ──────────────────────────────────────
[engagement]
client_name       = "Balmain-test2"
assessment_period = "July 2026"
analyst           = "analyst"
tenant_id         = ""           # fallback if --tenant-id CLI flag not supplied
output_filename   = "M365_SecurityReport.xlsx"

# ── LLM (set once at setup) ────────────────────────────────────────────
[llm]
provider         = "bedrock_runtime"
deployment_name  = "arn:aws:bedrock:ap-southeast-2:213146990554:application-inference-profile/mxnvznqf72bh"
aws_region       = "ap-southeast-2"
max_tokens       = 1500
timeout_seconds  = 60
# Zero data retention is enforced at the account level.
# Verify: aws bedrock get-account-data-retention --region ap-southeast-2
# Set:    aws bedrock put-account-data-retention --mode none --region ap-southeast-2

# ── Processing (change occasionally) ──────────────────────────────────
[processing]
# Criticality levels to include. ActionPlan.csv is pre-filtered to Shall/FAIL,
# so this mainly matters when using ScubaResults.csv as the input file.
include_criticality = ["Shall", "Shall/3rd Party", "Shall/Not Implemented"]
# "ActionPlan" (pre-filtered, recommended) or "ScubaResults" (full output)
input_file          = "ActionPlan"

# ── Severity mapping (security lead owns this) ─────────────────────────
# Maps ScubaGear Criticality values to pipeline severity levels.
# Compound Shall variants are treated as high — they are SHALL-level controls
# regardless of the implementation qualifier. The raw criticality value is
# always preserved in criticality_raw for LLM context and analyst review.
[severity_map]
"Shall"                 = "high"
"Should"                = "medium"
"May"                   = "low"
"Shall/3rd Party"       = "high"
"Shall/Not Implemented" = "high"

# ── Service prefixes → report section and ref prefix ──────────────────
# Maps the Control ID prefix to the output section name (as it appears in
# the Excel template) and the ref prefix for that section.
# Numbering resets per section: ENT1, ENT2, DEF1, DEF2, ...
[service_map]
"MS.AAD"          = { section = "Microsoft Entra ID (previously Azure Active Directory)", ref_prefix = "ENT" }
"MS.DEFENDER"     = { section = "Microsoft 365 Defender",   ref_prefix = "DEF" }
"MS.EXCHANGE"     = { section = "Microsoft Exchange Online", ref_prefix = "EXC" }
"MS.SHAREPOINT"   = { section = "Microsoft SharePoint",     ref_prefix = "SPT" }
"MS.TEAMS"        = { section = "Microsoft Teams",           ref_prefix = "TEA" }
"MS.POWERPLATFORM"= { section = "Microsoft Power Platform",  ref_prefix = "PPL" }

# ── Risk matrix (security lead owns this) ─────────────────────────────
[risk_matrix]
High_Major      = "High"
High_Moderate   = "High"
High_Minor      = "High"
Medium_Major    = "High"
Medium_Moderate = "Medium"
Medium_Minor    = "Medium"
Low_Major       = "Medium"
Low_Moderate    = "Medium"
Low_Minor       = "Low"

# ── Output (reporting owner) ───────────────────────────────────────────
[output]
template_path = "templates/Output_Template.xlsx"
# The Azure sheet in the template is used for M365 ScubaGear output.
# Section headers already present: Entra ID, Defender, Exchange, Power Platform, etc.
target_sheet  = "Azure"

[output.colours]
High   = "FFFF0000"
Medium = "FFFFC000"
Low    = "FF92D050"