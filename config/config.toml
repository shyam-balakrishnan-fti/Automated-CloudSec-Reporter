# config.toml — Pipeline configuration
# One file. Six sections. Different owners.
# API keys are NEVER stored here — use environment variables.

# ── Engagement (change every run) ──────────────────────────────────
[engagement]
client_name       = "Synthetic Test Client"
assessment_period = "June 2026"
analyst           = "analyst"
output_filename   = "SecurityReport_Jun2026.xlsx"

# ── LLM (set once at setup) ────────────────────────────────────────
[llm]
provider         = "azure_openai"   # azure_openai | bedrock | local_ollama
endpoint         = "https://your-instance.openai.azure.com/"
deployment_name  = "gpt-4o-mini"
api_key_env_var  = "AZURE_OPENAI_KEY"
max_tokens       = 1000
timeout_seconds  = 30

# ── Processing (change occasionally) ──────────────────────────────
[processing]
# Statuses that enter the working set. Everything else is preserved
# in canonical JSON but excluded from the output.
include_statuses = ["FAIL", "MUTED(FAIL)"]
preserve_passing = false

# ── Severity rules (security lead owns this) ──────────────────────
# Maps Prowler SEVERITY → pipeline Likelihood Rating
# Override rules are checked after the base mapping.
[severity_rules]
critical      = "High"
high          = "High"
medium        = "Medium"
low           = "Low"
informational = "Low"

# Category-based overrides: if ANY of these appear in CATEGORIES,
# force Likelihood to High regardless of SEVERITY.
likelihood_high_if_categories = ["internet-exposed"]

# ── Risk matrix (security lead owns this) ─────────────────────────
# Likelihood × Consequence → Risk Rating
# Keys are "Likelihood_Consequence"
[risk_matrix]
High_Major    = "High"
High_Moderate = "High"
High_Minor    = "High"
Medium_Major  = "High"
Medium_Moderate = "Medium"
Medium_Minor  = "Medium"
Low_Major     = "Medium"
Low_Moderate  = "Medium"
Low_Minor     = "Low"

# ── Output (reporting owner) ───────────────────────────────────────
[output]
template_path = "templates/org_template.xlsx"
ref_prefix    = "AWS"

[output.colours]
High   = "FFFF0000"
Medium = "FFFFC000"
Low    = "FF92D050"