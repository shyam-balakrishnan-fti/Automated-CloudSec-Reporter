# config.toml - Pipeline configuration
# One file. Six sections. Different owners.
# API keys are NEVER stored here - use environment variables.

# ── Engagement (change every run) ──────────────────────────────────
[engagement]
client_name       = "Synthetic Test Client"
assessment_period = "June 2026"
analyst           = "analyst"
output_filename   = "SecurityReport_Jun2026.xlsx"

# ── LLM (set once at setup) ────────────────────────────────────────
[llm]
provider         = "bedrock_runtime"
deployment_name  = "arn:aws:bedrock:ap-southeast-2:213146990554:application-inference-profile/mxnvznqf72bh" # "arn:aws:bedrock:ap-southeast-2:213146990554:application-inference-profile/78fidxvdv3nl"
aws_region       = "ap-southeast-2"
max_tokens       = 1000
timeout_seconds  = 60

# ── Processing (change occasionally) ──────────────────────────────
[processing]
include_statuses = ["FAIL", "MUTED(FAIL)"]
preserve_passing = false


# ── Severity rules (security lead owns this) ──────────────────────
[severity_rules]
critical      = "High"
high          = "High"
medium        = "Medium"
low           = "Low"
informational = "Low"
 
likelihood_high_if_categories = ["internet-exposed"]
 
# ── Risk matrix (security lead owns this) ─────────────────────────
[risk_matrix]
High_Major      = "High"
High_Moderate   = "High"
High_Minor      = "High"
Medium_Major    = "High"
Medium_Moderate = "Medium"
Medium_Minor    = "Medium"
Low_Major       = "Medium"
Low_Moderate    = "Medium"
Low_Minor       = "Low"
 
# ── Output (reporting owner) ───────────────────────────────────────
[output]
template_path = "templates/Output_Template.xlsx"
ref_prefix    = "AWS"
 
[output.colours]
High   = "FFFF0000"
Medium = "FFFFC000"
Low    = "FF92D050"
 
